jobs:
- job: Build
  displayName: Build and Push
  pool:
    vmImage: ubuntu-latest
  steps:
  - task: Docker@2
    displayName: Build container
    inputs:
      containerRegistry: gea-fht-acr
      repository: edge-administration-shell
      command: build
      Dockerfile: $(Build.SourcesDirectory)/Dockerfile
      arguments: --build-arg PORT=$(PORT) --build-arg=VERSION=$(tag) --build-arg=ENVIRONMENT=$(ENVIRONMENT)
      tags: |
        $(tag)
  - task: Docker@2
    displayName: Push container
    inputs:
      containerRegistry: gea-fht-acr
      repository: edge-administration-shell
      command: push
      tags: |
        $(tag)