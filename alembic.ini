[alembic]
# Path to the migration scripts directory
script_location = db/migrations

# File template for new migration scripts
file_template = %%(rev)s_%%(slug)s

# Add the project root to sys.path so imports in env.py resolve correctly
prepend_sys_path = .

# Timezone for "Create Date" in migration headers
timezone = UTC

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
